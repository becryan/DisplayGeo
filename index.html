<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Coregistration Image Pairs</title>
  <link rel="stylesheet" href="node_modules/ol/ol.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    .map {
      /* map fills left area */
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="app" style="display:flex; height:100vh;">
    <div id="map" class="map" style="flex:1; height:100%;"></div>

    <aside id="panel" class="panel"
      style="width:320px; padding:12px; box-shadow:-2px 0 6px rgba(0,0,0,0.1); background:#fff; overflow:auto;">
      <h5 class="black-text" style="margin-top:0;">Controls</h5>
      <div class="card">
        <div class="card-content">
          <div id="controls">
            <div class="input-field" style="margin-bottom:12px;"><label>Swipe:</label><input id="swipe" type="range"
                style="width:60%"></div>

            <div id="layer-controls" style="margin-bottom:12px; display:flex; gap:12px; align-items:flex-start;">
              <div id="layers-list" style="flex:1;"></div>

              <div style="display:flex; flex-direction:column; gap:6px;">
                <div class="file-field input-field">
                  <div class="btn"><span>File</span><input id="fileInput" type="file" accept=".tif,.tiff" multiple>
                  </div>
                  <div class="file-path-wrapper"><input class="file-path validate" type="text"
                      placeholder="Upload local GeoTIFFs"></div>
                </div>

                <div class="input-field" style="margin:0;">
                  <input id="urlInput" type="text" placeholder="https://.../image.tif" style="width:200px;">
                </div>
                <button id="loadUrl" class="btn">Load URL</button>
              </div>
            </div>

            <div id="readout" style="margin-top:8px; font-family:monospace;">
              <div><span id="coord">Coord: -</span></div>
              <div><span id="pixel">Pixel: -</span></div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script type="module" src="main.js"></script>
</body>

</html>
